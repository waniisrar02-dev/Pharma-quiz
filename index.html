<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacology MCQ Quiz - 200 Questions (Randomized)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 10px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); padding: 20px; }
        h1 { text-align: center; color: #667eea; margin-bottom: 5px; font-size: 1.8em; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9em; }
        .progress-bar { width: 100%; height: 6px; background: #e0e0e0; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); width: 0%; transition: width 0.3s ease; }
        .question-box { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #667eea; }
        .question-number { display: inline-block; background: #667eea; color: white; padding: 4px 12px; border-radius: 15px; font-size: 0.8em; font-weight: bold; margin-bottom: 10px; }
        .question-text { font-size: 1.1em; margin-bottom: 15px; line-height: 1.5; color: #2c3e50; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        @media (min-width: 600px) { .options-grid { grid-template-columns: 1fr 1fr; } }
        .option { background: white; border: 2px solid #e0e0e0; border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s ease; font-size: 0.95em; display: flex; align-items: center; gap: 8px; }
        .option:hover { background: #667eea; color: white; border-color: #667eea; }
        .option.correct { background: #28a745; color: white; border-color: #28a745; }
        .option.wrong { background: #dc3545; color: white; border-color: #dc3545; }
        .option.disabled { pointer-events: none; opacity: 0.7; }
        .option-letter { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; background: #667eea; color: white; border-radius: 50%; font-weight: bold; font-size: 0.85em; flex-shrink: 0; }
        .option:hover .option-letter { background: white; color: #667eea; }
        .option.correct .option-letter { background: white; color: #28a745; }
        .option.wrong .option-letter { background: white; color: #dc3545; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 2px solid #e0e0e0; }
        .btn { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-size: 0.9em; font-weight: bold; transition: all 0.3s ease; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #764ba2; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .score-display { font-size: 1.1em; font-weight: bold; color: #667eea; }
        .results { display: none; text-align: center; padding: 20px; }
        .results.show { display: block; }
        .final-score { font-size: 2.5em; color: #667eea; margin-bottom: 15px; }
        .result-message { font-size: 1.1em; margin-bottom: 20px; }
        .result-details { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px; max-height: 300px; overflow-y: auto; font-size: 0.9em; }
        .result-item { padding: 8px 0; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .result-item:last-child { border-bottom: none; }
        .result-item.correct { color: #28a745; }
        .result-item.wrong { color: #dc3545; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧬 Pharmacology Quiz</h1>
        <p class="subtitle">200 Questions • Random Order • Shuffled Options</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        
        <div id="quizContainer"></div>
        
        <div class="controls">
            <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">← Previous</button>
            <span class="score-display">Score: <span id="score">0</span>/200</span>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next →</button>
        </div>
        
        <div class="results" id="results">
            <div class="final-score"><span id="finalScore">0</span>/200</div>
            <div class="result-message" id="resultMessage"></div>
            <div class="result-details" id="resultDetails"></div>
        </div>
    </div>

    <script>
        // Raw quiz data (questions in original order, options not shuffled yet)
        const rawQuizData = [
            {"question": "Propranolol is related to?", "correct": "Beta one adrenoreceptor", "wrongOptions": ["Beta-2 adrenoreceptor", "Alpha-1 adrenoreceptor", "M-cholinoreceptor", "Nn-cholinoreceptor", "Dopamine receptor", "Serotonin receptor", "Histamine receptor", "GABA receptor", "Glutamate receptor"]},
            {"question": "What is the pharmacological group of heparin?", "correct": "Anticoagulants", "wrongOptions": ["Antiplatelet", "Antianginal", "Diuretics", "Antihypertensive", "Bronchodilator", "Antiepileptic", "Antipsychotic", "Antidepressant", "Antibiotic"]},
            {"question": "What is the pharmacological group of Nitroglycerin?", "correct": "Antianginal", "wrongOptions": ["Anticoagulants", "Antihypertensive", "Diuretics", "Antiplatelet", "Bronchodilator", "Antiepileptic", "Antipsychotic", "Analgesic", "Antibiotic"]},
            {"question": "Methyldopa is related to?", "correct": "alpha-2 adrenoreceptor", "wrongOptions": ["Beta-1 adrenoreceptor", "Alpha-1 adrenoreceptor", "M-cholinoreceptor", "Nn-cholinoreceptor", "Dopamine receptor", "Serotonin receptor", "Histamine receptor", "GABA receptor", "Glutamate receptor"]},
            {"question": "What is the pharmacological group of Ondansetron?", "correct": "Drugs for Treatment of vomiting", "wrongOptions": ["Drugs for Treatment of diarrhea", "Drugs for Treatment of constipation", "Drugs for Treatment of cough", "Drugs for Treatment of pain", "Drugs for Treatment of fever", "Drugs for Treatment of infection", "Drugs for Treatment of allergy", "Drugs for Treatment of asthma", "Drugs for Treatment of hypertension"]},
            {"question": "What is the pharmacological group of Lamotrigine?", "correct": "Antiepileptic", "wrongOptions": ["Antipsychotic", "Antidepressant", "Anxiolytic", "Hypnotic", "Analgesic", "Anti-inflammatory", "Antibiotic", "Antihypertensive", "Diuretic"]},
            {"question": "Tropicamide is related to?", "correct": "M-cholinoreceptor", "wrongOptions": ["Alpha-1 adrenoreceptor", "Beta-1 adrenoreceptor", "Nn-cholinoreceptor", "Dopamine receptor", "Serotonin receptor", "Histamine receptor", "GABA receptor", "Glutamate receptor", "Glycine receptor"]},
            {"question": "What is the pharmacological group of Exemestane?", "correct": "Aromatase Inhibitor", "wrongOptions": ["Antiestrogen", "Estrogen agonist", "Progesterone antagonist", "Androgen receptor blocker", "GnRH agonist", "Selective estrogen receptor modulator", "Progestin", "Androgen", "Corticosteroid"]},
            {"question": "What is the pharmacological group of Moxonidine?", "correct": "Hypotensive/Antihypertensive", "wrongOptions": ["Diuretics", "Antianginal", "Anticoagulants", "Antiplatelet", "Bronchodilator", "Antiepileptic", "Antipsychotic", "Analgesic", "Antibiotic"]},
            {"question": "Oxybutynin is related to?", "correct": "M-cholinoreceptor", "wrongOptions": ["Alpha-1 adrenoreceptor", "Beta-1 adrenoreceptor", "Nn-cholinoreceptor", "Dopamine receptor", "Serotonin receptor", "Histamine receptor", "GABA receptor", "Glutamate receptor", "Glycine receptor"]}
        ];
        
        // Function to shuffle array (Fisher-Yates algorithm)
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        // Prepare shuffled quiz data
        const quizData = shuffleArray(rawQuizData).map(q => {
            // Combine correct and wrong options
            const allOptions = [q.correct, ...q.wrongOptions];
            // Shuffle options
            const shuffledOptions = shuffleArray(allOptions);
            // Find index of correct answer in shuffled array
            const correctIndex = shuffledOptions.indexOf(q.correct);
            
            return {
                question: q.question,
                options: shuffledOptions,
                correct: q.correct,
                correctIndex: correctIndex
            };
        });
        
        let currentQuestion = 0;
        let score = 0;
        let userAnswers = [];
        let answered = false;
        
        function loadQuestion() {
            answered = false;
            const container = document.getElementById('quizContainer');
            const q = quizData[currentQuestion];
            
            let html = `<div class="question-box fade-in">
                <span class="question-number">Question ${currentQuestion + 1} of 200</span>
                <div class="question-text">${q.question}</div>
                <div class="options-grid">`;
            
            const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
            q.options.forEach((opt, idx) => {
                html += `<div class="option" onclick="selectOption(this, ${idx})" data-idx="${idx}">
                    <span class="option-letter">${letters[idx]}</span>
                    <span>${opt}</span>
                </div>`;
            });
            
            html += '</div></div>';
            container.innerHTML = html;
            
            document.getElementById('progressBar').style.width = ((currentQuestion + 1) / 200 * 100) + '%';
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').textContent = currentQuestion === 199 ? 'Finish' : 'Next →';
        }
        
        function selectOption(element, selectedIndex) {
            if (answered) return;
            answered = true;
            
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'wrong'));
            
            const q = quizData[currentQuestion];
            const isCorrect = selectedIndex === q.correctIndex;
            
            if (isCorrect) {
                element.classList.add('correct');
                score++;
            } else {
                element.classList.add('wrong');
                const correctOption = document.querySelector(`.option[data-idx="${q.correctIndex}"]`);
                if (correctOption) correctOption.classList.add('correct');
            }
            
            document.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
            
            userAnswers.push({
                question: currentQuestion, 
                correct: isCorrect, 
                selected: q.options[selectedIndex], 
                correctAnswer: q.correct,
                selectedLetter: ['A','B','C','D','E','F','G','H','I','J'][selectedIndex],
                correctLetter: ['A','B','C','D','E','F','G','H','I','J'][q.correctIndex]
            });
            document.getElementById('score').textContent = score;
        }
        
        function nextQuestion() {
            if (currentQuestion < 199) {
                currentQuestion++;
                loadQuestion();
            } else {
                showResults();
            }
        }
        
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }
        
        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            document.querySelector('.controls').style.display = 'none';
            document.querySelector('.progress-bar').style.display = 'none';
            document.getElementById('results').classList.add('show');
            
            document.getElementById('finalScore').textContent = score;
            
            let html = '<h3>Review:</h3>';
            userAnswers.forEach((ans, idx) => {
                const q = quizData[ans.question];
                const status = ans.correct ? 'correct' : 'wrong';
                const icon = ans.correct ? '✓' : '✗';
                html += `<div class="result-item ${status}">
                    <span>Q${idx + 1}: ${q.question}</span>
                    <span>${icon} You: ${ans.selectedLetter} | Correct: ${ans.correctLetter}</span>
                </div>`;
            });
            document.getElementById('resultDetails').innerHTML = html;
            
            const msg = document.getElementById('resultMessage');
            const pct = (score / 200) * 100;
            if (pct >= 80) { msg.textContent = '🎉 Excellent! Expert level!'; msg.style.color = '#28a745'; }
            else if (pct >= 60) { msg.textContent = '👍 Good job! Well done.'; msg.style.color = '#667eea'; }
            else if (pct >= 40) { msg.textContent = '💪 Keep practicing!'; msg.style.color = '#ffc107'; }
            else { msg.textContent = '📚 Review needed.'; msg.style.color = '#dc3545'; }
        }
        
        loadQuestion();
    </script>
</body>
</html>
